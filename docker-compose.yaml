services:
  db:
    image: neo4j:4.4.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      internal:
        ipv4_address: 172.24.0.10
    volumes:
      - $PWD/neo4j_mount/data:/data
      - $PWD/neo4j_mount/logs:/logs
      - $PWD/neo4j_mount/conf:/conf
    environment:
      - NEO4J_AUTH=neo4j/test
      - NEO4J_dbms_memory_pagecache_size=1536m
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3g

  app:
    image: jdkuenzi/neo4jtp:latest
    depends_on:
      - db
    networks:
      - internal
    environment:
      - JSON_URL=http://vmrum.isc.heia-fr.ch/files/DBLP-Citation-network-V18.jsonl
      - MAX_NODES=1700000
      - NEO4J_IP=172.24.0.10 # must be the same as above
      - NEO4J_AUTH=neo4j/test # must be the same as above
      - BATCH_SIZE=1000
      - CHUNK_SIZE=1000
      - LOG_INTERVAL=100000
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3g

networks:
  internal:
    ipam:
      driver: default
      config:
        - subnet: "172.24.0.0/24"
